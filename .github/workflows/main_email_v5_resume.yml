name: Filter RSS Feed everyday + Scored Briefing + Email audit

on:
  schedule:
    # 오전 8시 CDT = 13:00 UTC + 17분
    - cron: '17 13 * * *'
    # 7PM Texas (CDT) = 00:00 UTC (technically next day midnight, but cron remains the same) + 17 min
    - cron: '17 0 * * *'
  workflow_dispatch:

jobs:
  filter-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Restore checkpoint from the most recent previous run.
      # Artifacts are scoped to the current run, so they cannot reliably resume the next run.
      - name: Restore RSS checkpoint cache
        id: restore-checkpoint
        uses: actions/cache/restore@v4
        with:
          path: |
            last_failed_journal.txt
            partial_email_content.txt
            partial_briefing_records.json
            filtered_feed_*.xml
            filtered_titles.txt
            briefing.html
            filtered_results.html
            index.html
          key: rss-checkpoint-${{ github.run_id }}
          restore-keys: |
            rss-checkpoint-

      - name: Prepare working state file
        run: |
          if [ ! -f last_failed_journal.txt ]; then
            echo "SUCCESS" > last_failed_journal.txt
          fi
          echo "Checkpoint state:"
          cat last_failed_journal.txt || true

      - name: Set up Python with caching
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script to filter RSS and create files
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python filter_rss_v7_resume.py

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: filtered-files
          if-no-files-found: warn
          path: |
            filtered_titles.txt
            filtered_feed_*.xml
            briefing.html
            filtered_results.html
            index.html
            last_failed_journal.txt
            partial_email_content.txt
            partial_briefing_records.json

      # Save checkpoint for the next run, even on failure.
      # Use a unique key because GitHub cache entries are immutable.
      - name: Save RSS checkpoint cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            last_failed_journal.txt
            partial_email_content.txt
            partial_briefing_records.json
            filtered_feed_*.xml
            filtered_titles.txt
            briefing.html
            filtered_results.html
            index.html
          key: rss-checkpoint-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages

      - name: Get UTC hour
        if: success()
        id: get_hour
        run: echo "hour=$(date -u +%H)" >> $GITHUB_OUTPUT

      - name: Send email with results
        if: success() && steps.get_hour.outputs.hour > '10'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[hoonica RSS] New Paper Updates'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: file://filtered_titles.txt

  failure-notification:
    runs-on: ubuntu-latest
    needs: filter-and-deploy
    if: ${{ always() && needs.filter-and-deploy.result == 'failure' }}

    steps:
      - name: Download error log artifact
        uses: actions/download-artifact@v4
        with:
          name: filtered-files
        continue-on-error: true

      - name: Send email with error report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[hoonica RSS] Action Failed!'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: file://filtered_titles.txt
