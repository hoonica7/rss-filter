name: Filter RSS Feed everyday + Scored Briefing + Email audit

# Note: 'on' is quoted because unquoted YAML 1.1 parses bare `on` as boolean
# True, which causes GitHub's workflow validator to display
# "No event triggers defined in `on`" on every commit (cosmetic only — the
# actual scheduler still runs, but the red warning is annoying).
"on":
  schedule:
    # 11:00 UTC + 17분
    - cron: '17 11 * * *'
    # 22:00 UTC + 17 min
    - cron: '17 22 * * *'
  workflow_dispatch:

jobs:
  filter-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Restore checkpoint from the most recent previous run.
      # Artifacts are scoped to the current run, so they cannot reliably resume the next run.
      - name: Restore RSS checkpoint cache
        id: restore-checkpoint
        uses: actions/cache/restore@v5
        with:
          path: |
            last_failed_journal.txt
            partial_email_content.txt
            partial_briefing_records.json
            filtered_feed_*.xml
            filtered_titles.txt
            briefing.html
            slides.html
            filtered_results.html
            index.html
            pending_classification_queue.json
          key: rss-checkpoint-${{ github.run_id }}
          restore-keys: |
            rss-checkpoint-

      - name: Prepare working state file
        run: |
          if [ ! -f last_failed_journal.txt ]; then
            echo "SUCCESS" > last_failed_journal.txt
          fi
          echo "Checkpoint state:"
          cat last_failed_journal.txt || true

      - name: Set up Python with caching
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade google-genai

      - name: Run Python script to filter RSS and create files
        env:
          # Three Gemini API keys for rotation. Filter_RSS.py tries every model
          # on KEY1; if all fail it switches to KEY2; etc. After all 3 keys x
          # all models fail it defers the batch to the pending queue.
          GOOGLE_API_KEY1: ${{ secrets.GOOGLE_API_KEY1 }}
          GOOGLE_API_KEY2: ${{ secrets.GOOGLE_API_KEY2 }}
          GOOGLE_API_KEY3: ${{ secrets.GOOGLE_API_KEY3 }}
          # Optional: override model order. Default if empty/unset:
          #   gemini-3-flash-preview,gemini-3.1-flash-lite-preview,gemini-2.5-flash
          GEMINI_MODELS: ${{ secrets.GEMINI_MODELS }}
          GEMINI_BATCH_SIZE: "25"
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python Filter_RSS.py

      - name: Add favicon to generated HTML
        run: |
          for file in index.html briefing.html slides.html filtered_results.html; do
            if [ -f "$file" ] && ! grep -q "favicon.svg" "$file"; then
              perl -0pi -e "s#</head>#<link rel='icon' href='favicon.svg' type='image/svg+xml'></head>#" "$file"
            fi
          done

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: filtered-files
          if-no-files-found: warn
          retention-days: 14
          path: |
            filtered_titles.txt
            filtered_feed_*.xml
            briefing.html
            slides.html
            filtered_results.html
            index.html
            favicon.svg
            pending_classification_queue.json
            last_failed_journal.txt
            partial_email_content.txt
            partial_briefing_records.json

      # Save checkpoint for the next run, even on failure.
      # Use a unique key because GitHub cache entries are immutable.
      - name: Save RSS checkpoint cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            last_failed_journal.txt
            partial_email_content.txt
            partial_briefing_records.json
            filtered_feed_*.xml
            filtered_titles.txt
            briefing.html
            slides.html
            filtered_results.html
            index.html
            pending_classification_queue.json
          key: rss-checkpoint-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages

      - name: Get UTC hour
        if: success()
        id: get_hour
        run: echo "hour=$(date -u +%H)" >> $GITHUB_OUTPUT

      - name: Send email with results
        if: success() && fromJSON(steps.get_hour.outputs.hour) >= 10
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[hoonica RSS] New Paper Updates'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: file://filtered_titles.txt

  failure-notification:
    runs-on: ubuntu-latest
    needs: filter-and-deploy
    if: ${{ always() && needs.filter-and-deploy.result == 'failure' }}

    steps:
      - name: Download error log artifact
        uses: actions/download-artifact@v7
        with:
          name: filtered-files
        continue-on-error: true

      - name: Send email with error report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[hoonica RSS] Action Failed!'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: file://filtered_titles.txt
